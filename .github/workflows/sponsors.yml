name: sponsors

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
      - run: go install github.com/goreleaser/sponsors@latest
      - run: sponsors generate --config gh://goreleaser/.github/sponsors.yml sponsors.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: sponsors apply sponsors.json gh://goreleaser/.github/sponsors.tpl.md README.md
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update sponsors"
          file_pattern: "README.md"
